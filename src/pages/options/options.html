<div class="settings">
    <div class="settings_headline">
        <p class="settings_headline_text">Settings</p>
        <img src="/images/setting_line.png">

        <div class="selection">
            <img src="/images/palette.png">
            <p class="selection_text">Game themes</p>
        </div>
        <div class="option">
            <form data-theme-options>
                <label data-theme-id="theme-1">
                    <input type="radio" name="game-theme" value="theme-1" checked> Code vibes theme
                </label><br>
                <label data-theme-id="theme-2">
                    <input type="radio" name="game-theme" value="theme-2"> Gaming therme
                </label><br>

                <label data-theme-id="theme-3">
                    <input type="radio" name="game-theme" value="theme-3"> DA Projects theme
                </label><br>

                <label data-theme-id="theme-4">
                    <input type="radio" name="game-theme" value="theme-4"> Foods theme
                </label>
            </form>

        </div>

        <div class="selection">
            <img src="/images/palette.png">
            <p class="selection_text">Choose player</p>
        </div>
        <div class="option">
            <form>
                <label>
                    <input type="radio" name="option" value="1" checked> Blue
                </label><br>

                <label>
                    <input type="radio" name="option" value="2"> Orange
                </label><br>

               
            </form>
        </div>


        <div class="selection">
            <img src="/images/palette.png">
            <p class="selection_text">Board size</p>
        </div>

        <div class="option">
            <form>
                <label>
                    <input type="radio" name="option" value="1" checked> 16 cards
                </label><br>
                <label>
                    <input type="radio" name="option" value="2"> 24 cards
                </label><br>
                <label>
                    <input type="radio" name="option" value="3"> 36 cards
                </label><br>

            </form>
        </div>
    </div>


    <div class="setting_info">
        <div class="setting_info_themes">
            <img data-theme-preview src="/themes/Theme Visua_one.png" alt="Theme Visual One preview">
        </div>

        <div class="setting_info_summary">
            <div class="setting_detail_show">
                <p>Theme</p>
                <img src="public/images/line_load.png">

            </div>

            <div class="setting_detail_show">
                <P>Player</P>
                <img src="public/images/line_load.png">
            </div>

            <div class="setting_detail_show">
                <p>Board size</p>
                <button onclick="" class="btn">
                    <span class="icon icon-start"></span>
                    <span class="icon icon-hover"></span>
                </button>

            </div>

        </div>
    </div>
</div>
